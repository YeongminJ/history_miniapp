<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #3E2723; }
      body {
        width: 600px;
        height: 600px;
        overflow: hidden;
        position: relative;
      }
      /*
       * 최종 로고는 source/logo-uploaded.png 를 그대로 600x600 으로 리사이즈한
       * 결과 (out/logo.png)에요. 외부도 브랜드 갈색이라 모서리 처리·crop 없음.
       * 이 파일은 헤드리스 크롬으로 캡처할 때 동일 결과가 나오도록 유지.
       */
      img {
        position: absolute;
        top: 0;
        left: 0;
        width: 600px;
        height: 600px;
        display: block;
      }
    </style>
  </head>
  <body>
    <img src="source/logo-uploaded.png" alt="" />
  </body>
</html>
